<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassHub - Portal Kelas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',   // Biru Elektrik
                        secondary: '#F3F4F6', // Abu-abu terang (Light mode bg)
                        accent: '#FACC15',    // Kuning (Call to action)
                        darkBg: '#111827',    // Background dark mode
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-200 font-sans antialiased transition-colors duration-300">
    
    <!-- Mobile App Container -->
    <div class="max-w-md mx-auto min-h-screen bg-white dark:bg-gray-900 shadow-xl relative pb-20">
        
        <!-- Header -->
        <header class="bg-primary text-white p-4 sticky top-0 z-10 rounded-b-2xl shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-graduation-cap mr-2"></i>ClassHub</h1>
            <div class="flex gap-4">
                <button id="themeToggle" class="text-white hover:text-accent transition"><i class="fa-solid fa-moon"></i></button>
                <button id="adminLoginBtn" class="text-white hover:text-accent transition"><i class="fa-solid fa-lock"></i></button>
                <button id="adminLogoutBtn" class="text-white hover:text-accent transition hidden"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex border-b dark:border-gray-700 mt-4">
            <button id="tabLinks" class="flex-1 py-3 text-center font-semibold text-primary border-b-2 border-primary">Link Penting</button>
            <button id="tabFiles" class="flex-1 py-3 text-center font-semibold text-gray-500 hover:text-primary transition">Materi Kelas</button>
        </div>

        <!-- Content Area: Links -->
        <main id="contentLinks" class="p-4 space-y-3">
            <h2 class="font-bold text-lg mb-2 text-gray-700 dark:text-gray-300">Daftar Tautan</h2>
            <!-- Container for Links -->
            <div id="linksContainer" class="space-y-3">
                <!-- Data akan di-render oleh JS -->
                <p class="text-center text-sm text-gray-400">Memuat data...</p>
            </div>
        </main>

        <!-- Content Area: Files (Hidden by default) -->
        <main id="contentFiles" class="p-4 space-y-3 hidden">
            <h2 class="font-bold text-lg mb-2 text-gray-700 dark:text-gray-300">Modul & Dokumen</h2>
            <!-- Container for Files -->
            <div id="filesContainer" class="space-y-3">
                <!-- Data akan di-render oleh JS -->
            </div>
        </main>

        <!-- Admin Floating Action Button -->
        <button id="fabAdd" class="hidden absolute bottom-6 right-6 bg-accent text-gray-900 w-14 h-14 rounded-full shadow-lg text-2xl flex items-center justify-center hover:bg-yellow-500 transition transform hover:scale-105 z-20">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- Login Modal (Hidden) -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-11/12 max-w-sm">
            <h3 class="text-xl font-bold mb-4">Login Admin</h3>
            <input type="email" id="emailInput" placeholder="Email" class="w-full p-3 mb-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
            <input type="password" id="passwordInput" placeholder="Password" class="w-full p-3 mb-4 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary">
            <div class="flex justify-end gap-2">
                <button id="closeLoginBtn" class="px-4 py-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">Batal</button>
                <button id="submitLoginBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-700">Login</button>
            </div>
        </div>
    </div>

    <!-- Script Utama (Type Module untuk Firebase v10) -->
    <script type="module" src="script.js"></script>
</body>
</html>
