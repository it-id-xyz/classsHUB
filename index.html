<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <title>ClassHub - Portal Kelas</title>
    <link rel="stylesheet" href="output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-200 font-sans antialiased transition-colors duration-300">
    
    <div class="max-w-md mx-auto min-h-screen bg-white dark:bg-gray-900 shadow-xl relative pb-20">
        <!-- Header & Tabs (Tetap sama seperti sebelumnya) -->
        <header class="bg-blue-600 text-white p-4 sticky top-0 z-10 rounded-b-2xl shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-graduation-cap mr-2"></i>ClassHub</h1>
            <div class="flex gap-4">
                <button id="themeToggle" class="text-white hover:text-yellow-400 transition"><i class="fa-solid fa-moon"></i></button>
                <button id="adminLoginBtn" class="text-white hover:text-yellow-400 transition"><i class="fa-solid fa-lock"></i></button>
                <button id="adminLogoutBtn" class="text-white hover:text-yellow-400 transition hidden"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <div class="flex border-b dark:border-gray-700 mt-4">
            <button id="tabLinks" class="flex-1 py-3 text-center font-semibold text-blue-600 border-b-2 border-blue-600">Link Penting</button>
            <button id="tabFiles" class="flex-1 py-3 text-center font-semibold text-gray-500 hover:text-blue-600 transition">Materi Kelas</button>
        </div>

        <main id="contentLinks" class="p-4 space-y-3">
            <div id="linksContainer" class="space-y-3"></div>
        </main>

        <main id="contentFiles" class="p-4 space-y-3 hidden">
            <div id="filesContainer" class="space-y-3"></div>
        </main>

        <button id="fabAdd" class="hidden absolute bottom-6 right-6 bg-yellow-400 text-gray-900 w-14 h-14 rounded-full shadow-lg text-2xl flex items-center justify-center hover:bg-yellow-500 transition transform hover:scale-105 z-20">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <!-- ... (Isi Login Modal sama seperti sebelumnya) ... -->
    </div>

    <!-- Modal Form Tambah Data (Link / File) -->
    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-11/12 max-w-sm">
            <h3 class="text-xl font-bold mb-4" id="modalTitle">Tambah Data</h3>
            
            <div class="flex gap-2 mb-4">
                <button id="btnTypeLink" class="flex-1 py-2 bg-blue-100 text-blue-600 rounded-lg font-semibold border border-blue-600">Link</button>
                <button id="btnTypeFile" class="flex-1 py-2 bg-gray-100 text-gray-500 rounded-lg font-semibold border border-transparent">File</button>
            </div>

            <form id="addForm">
                <input type="text" id="inputTitle" placeholder="Judul (Contoh: Zoom Matpel X)" required class="w-full p-3 mb-3 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <!-- Input URL (Default Show) -->
                <input type="url" id="inputUrl" placeholder="https://..." class="w-full p-3 mb-4 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <!-- Input File (Default Hidden) -->
                <input type="file" id="inputFile" class="hidden w-full p-3 mb-4 border rounded-lg dark:bg-gray-700 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <div id="uploadProgress" class="hidden w-full bg-gray-200 rounded-full h-2.5 mb-4 dark:bg-gray-700">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>

                <div class="flex justify-end gap-2">
                    <button type="button" id="closeAddBtn" class="px-4 py-2 text-gray-500">Batal</button>
                    <button type="submit" id="submitAddBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
