<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fix Favicon 404 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <title>ClassHub - Portal Kelas</title>
    <!-- Link ke hasil build Tailwind (Bukan CDN lagi) -->
    <link rel="stylesheet" href="output.css">
    <!-- FontAwesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 dark:bg-black text-gray-800 dark:text-gray-200 font-sans antialiased transition-colors duration-300">
    
    <div class="max-w-md mx-auto min-h-screen bg-white dark:bg-gray-900 shadow-xl relative pb-20">
        
        <!-- Header -->
        <header class="bg-blue-600 text-white p-4 sticky top-0 z-10 rounded-b-2xl shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-graduation-cap mr-2"></i>ClassHub</h1>
            <div class="flex gap-4">
                <button id="themeToggle" class="text-white hover:text-yellow-400 transition"><i class="fa-solid fa-moon"></i></button>
                <button id="adminLoginBtn" class="text-white hover:text-yellow-400 transition"><i class="fa-solid fa-lock"></i></button>
                <button id="adminLogoutBtn" class="text-white hover:text-yellow-400 transition hidden"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="flex border-b dark:border-gray-700 mt-4">
            <button id="tabLinks" class="flex-1 py-3 text-center font-semibold text-blue-600 border-b-2 border-blue-600">Link Penting</button>
            <button id="tabFiles" class="flex-1 py-3 text-center font-semibold text-gray-500 hover:text-blue-600 transition">Materi Kelas</button>
        </div>

        <!-- Content Area: Links -->
        <main id="contentLinks" class="p-4 space-y-3">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-lg text-gray-700 dark:text-gray-300">Daftar Tautan</h2>
            </div>
            <!-- Container for Links (Empty by default) -->
            <div id="linksContainer" class="space-y-3"></div>
        </main>

        <!-- Content Area: Files -->
        <main id="contentFiles" class="p-4 space-y-3 hidden">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-lg text-gray-700 dark:text-gray-300">Modul & Dokumen</h2>
            </div>
            <!-- Container for Files (Empty by default) -->
            <div id="filesContainer" class="space-y-3"></div>
        </main>

        <!-- Admin Floating Action Button -->
        <button id="fabAdd" class="hidden absolute bottom-6 right-6 bg-yellow-400 text-gray-900 w-14 h-14 rounded-full shadow-lg text-2xl flex items-center justify-center hover:bg-yellow-500 transition transform hover:scale-105 z-20">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- Login Modal (Google Auth) -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-2xl w-11/12 max-w-sm text-center">
            <h3 class="text-xl font-bold mb-6 text-gray-800 dark:text-white">Admin Access</h3>
            
            <button id="btnGoogleLogin" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-white py-3 px-4 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition shadow-sm mb-4">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google Logo">
                <span class="font-medium">Login dengan Google</span>
            </button>

            <button id="closeLoginBtn" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 text-sm underline">Batal</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
