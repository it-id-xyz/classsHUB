<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <title>ClassHub - Portal Kelas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo"><i class="fa-solid fa-graduation-cap"></i> ClassHub</h1>
            <div class="header-actions">
                <button id="themeToggle" title="Ganti Tema"><i class="fa-solid fa-moon"></i></button>
                <button id="adminLoginBtn" title="Login Admin"><i class="fa-solid fa-lock"></i></button>
                <button id="adminLogoutBtn" class="hidden" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </header>

        <!-- Tabs -->
        <div class="tabs">
            <button id="tabLinks" class="tab-btn active">Link Penting</button>
            <button id="tabFiles" class="tab-btn">Materi Kelas</button>
        </div>

        <!-- Content Area: Links -->
        <main id="contentLinks" class="content-area">
            <h2 class="section-title">Daftar Tautan</h2>
            <div id="linksContainer" class="data-container"></div>
        </main>

        <!-- Content Area: Files (Materi URL) -->
        <main id="contentFiles" class="content-area hidden">
            <h2 class="section-title">Modul & Dokumen</h2>
            <div id="filesContainer" class="data-container"></div>
        </main>

        <!-- Admin Floating Action Button -->
        <button id="fabAdd" class="fab hidden" title="Tambah Data">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <!-- Login Modal (Google Auth) -->
    <div id="loginModal" class="modal hidden">
        <div class="modal-content text-center">
            <h3>Admin Access</h3>
            <button id="btnGoogleLogin" class="btn-google">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo">
                <span>Login dengan Google</span>
            </button>
            <button id="closeLoginBtn" class="btn-cancel">Batal</button>
        </div>
    </div>

    <!-- Modal Form Tambah Data (Tanpa Storage, Hanya Input URL File) -->
    <div id="addModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalTitle">Tambah Data</h3>
            
            <div class="form-tabs">
                <button id="btnTypeLink" class="form-tab-btn active">Tautan Web</button>
                <button id="btnTypeFile" class="form-tab-btn">Link Materi (G-Drive)</button>
            </div>

            <form id="addForm">
                <input type="text" id="inputTitle" placeholder="Judul (Contoh: Zoom Matpel X)" required class="input-field">
                <input type="url" id="inputUrl" placeholder="https://..." required class="input-field">
                
                <div class="modal-actions">
                    <button type="button" id="closeAddBtn" class="btn-cancel">Batal</button>
                    <button type="submit" id="submitAddBtn" class="btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
